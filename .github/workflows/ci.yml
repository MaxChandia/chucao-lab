name: CI/CD ChucaoLab - Pruebas Automáticas

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      # Esto quita el error de "Node 20 is deprecated" de una vez
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Inyectamos las variables de Sanity para que el build no falle
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}

    steps:
    - name: 📥 Descargar el código
      uses: actions/checkout@v4

    - name: ⚙️ Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: 📦 Instalar dependencias
      run: npm install

    - name: 🧪 Ejecutar Pruebas Unitarias (Jest)
      run: npm run test

    - name: 🌐 Instalar navegadores para Playwright
      run: npx playwright install --with-deps

    - name: 🏗️ Compilar el proyecto (Next.js Build)
      run: npm run build

    - name: 🎭 Ejecutar Pruebas End-to-End (Playwright)
      run: npx playwright test

    - name: 📊 Guardar reporte de Playwright (Si algo falla)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7